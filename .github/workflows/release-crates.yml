# 推送版本 tag（如 v0.0.4）时：校验 Cargo 版本与 tag 一致，按依赖拓扑序发布 workspace 内 crate 到 crates.io。
# 使用 cargo-publish-ordered 自动根据 Cargo.toml 的 path 依赖计算发布顺序，避免手写列表与依赖不同步。
#
# 仓库 Secrets：CARGO_REGISTRY_TOKEN（crates.io 的 API token）
name: Release Cargo (crates.io)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag version: $VERSION"

      - name: Verify Cargo workspace version matches tag
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/' | tr -d ' ')
          if [ "$CARGO_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Cargo.toml workspace version '$CARGO_VERSION' does not match tag ${{ steps.version.outputs.version }}"
            exit 1
          fi
          echo "Version OK: $CARGO_VERSION"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-publish-ordered
        run: cargo install cargo-publish-ordered

      - name: Publish crates (topological order)
        run: cargo publish-ordered --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
